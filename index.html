<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POPYANG</title>
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: none; 
            box-sizing: border-box;
            -webkit-touch-callout: none;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: black; 
            user-select: none; -webkit-user-select: none; 
            font-family: 'Arial Black', sans-serif; 
        }

        /* 遊戲背景層：設為 z-index: 1 */
        #game-target {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            z-index: 1;
            background: url('https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg') center/cover no-repeat;
            transform: translateZ(0);
            will-change: background-image;
        }

        #game-target.active {
            background-image: url('https://raw.githubusercontent.com/091cc/pop-yang/main/3.jpg');
        }

        /* UI 與選單層：必須在最上方 z-index: 10+ */
        #ui-container { 
            position: absolute; top: 20px; left: 50%; 
            transform: translateX(-50%); display: flex; 
            flex-direction: column; align-items: center; 
            z-index: 10; pointer-events: none; width: 100%; 
        }

        #game-logo { width: 80px; height: 80px; margin-bottom: 10px; border-radius: 50%; border: 3px solid white; }
        #popyang { color: white; font-size: 50px; font-weight: 900; text-shadow: 4px 4px 0 #000; }
        #score { color: white; font-size: 55px; font-weight: 900; text-shadow: 4px 4px 0 #000; }
        
        #menu { 
            position: absolute; top: 20px; right: 20px; 
            z-index: 100; /* 確保選單在最上層 */
            display: flex; flex-direction: column; gap: 10px; 
        }
        
        button, .lang-select { 
            padding: 10px 15px; border-radius: 12px; border: 3px solid black; 
            font-weight: bold; cursor: pointer; background: white; 
            box-shadow: 0 4px 0 #000; pointer-events: auto; /* 確保可以被點擊 */
        }

        .modal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 25px; border-radius: 25px; z-index: 200; 
            display: none; width: 90%; max-width: 320px; border: 6px solid #000; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); color: black;
        }

        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }

        /* 預加載隱形元素，防止點擊瞬間才去抓圖 */
        body::after {
            content: url('https://raw.githubusercontent.com/091cc/pop-yang/main/3.jpg');
            display: none;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <img src="logo.png" id="game-logo" onerror="this.style.display='none'">
        <div id="popyang">POPYANG</div>
        <div id="score">0</div>
    </div>

    <div id="game-target"></div>

    <div id="menu">
        <button id="open-auth-btn">👤 LOGIN/SIGN UP</button>
        <button id="rank-btn">🏆 Leader Board</button>
        <button id="achievement-btn">🎖️ Achievement</button>
            <option value="en">🌏 English</option>
            <option value="zh-TW" data-url="tw">🌏 正體中文</option>
            <option value="zh-cn" data-url="cn">🌏 残体中文</option>
        </select>
    </div>

    <div id="auth-box" class="modal">
        <h2 style="text-align:center;">Login</h2>
        <input type="email" id="auth-email" placeholder="Email" style="width:100%; padding:10px; margin:5px 0;">
        <input type="password" id="auth-password" placeholder="Password" style="width:100%; padding:10px; margin:5px 0;">
        <button id="email-login-btn" style="width:100%; background:#4CAF50; color:white;">Login</button>
        <button id="google-login-btn" style="width:100%; margin-top:5px;">Google Login</button>
        <button id="close-auth" style="width:100%; margin-top:10px;">Cancel</button>
    </div>

    <div id="user-menu-box" class="modal">
        <h2 style="text-align:center;">Settings</h2>
        <input type="text" id="new-nickname" placeholder="New Name" style="width:100%; padding:10px;">
        <button id="update-name-btn" style="width:100%; background:#4CAF50; color:white; margin-top:10px;">Update Name</button>
        <button id="logout-btn" style="width:100%; background:#ff7675; color:white; margin-top:5px;">Logout</button>
        <button id="close-user" style="width:100%; margin-top:10px;">Close</button>
    </div>

    <div id="leaderboard-box" class="modal">
        <h2 style="text-align:center;">Top 10</h2>
        <div id="rank-list">Loading...</div>
        <button id="close-rank" style="width:100%; margin-top:15px;">Close</button>
    </div>

    <div id="achievement-box" class="modal">
        <h2 style="text-align:center;">🏅 Achievements</h2>
        <p style="text-align:center;">Coming soon...</p>
        <button id="close-achievement" style="width:100%; margin-top:15px;">Close</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signInWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJYoQH85HDsRsS-Ue69DPfRaJXik7kcEY",
            authDomain: "pop-yang.firebaseapp.com",
            projectId: "pop-yang",
            storageBucket: "pop-yang.firebasestorage.app",
            messagingSenderId: "787574512577",
            appId: "1:787574512577:web:72094160cc3da32b86ed40"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        const scoreDisplay = document.getElementById('score');
        const gameTarget = document.getElementById('game-target');
        
        let count = parseInt(localStorage.getItem('yang_clicks')) || 0;
        let currentUser = null;
        let isPressed = false;
        let uploadTimer = null;
        scoreDisplay.textContent = count;

        // 音效池
        const audioPool = Array.from({ length: 10 }, () => new Audio('pop.mp3'));
        let poolIdx = 0;
        function playPop() {
            const s = audioPool[poolIdx];
            s.currentTime = 0;
            s.play().catch(()=>{});
            poolIdx = (poolIdx + 1) % audioPool.length;
        }

        // 核心連點邏輯
        function pressDown(e) {
            if (isPressed) return;
            if (e && e.cancelable) e.preventDefault();
            isPressed = true;
            
            count++;
            scoreDisplay.textContent = count;
            localStorage.setItem('yang_clicks', count);
            playPop();

            requestAnimationFrame(() => gameTarget.classList.add('active'));

            if (currentUser) {
                clearTimeout(uploadTimer);
                uploadTimer = setTimeout(syncDataToFirebase, 2000);
            }
        }

        function pressUp() { 
            isPressed = false; 
            requestAnimationFrame(() => gameTarget.classList.remove('active'));
        }

        // 綁定事件
        if ('ontouchstart' in window) {
            gameTarget.addEventListener('touchstart', pressDown, { passive: false });
            window.addEventListener('touchend', pressUp);
        } else {
            gameTarget.addEventListener('mousedown', (e) => { if(e.button === 0) pressDown(e); });
            window.addEventListener('mouseup', pressUp);
        }

        // Firebase 數據同步
        async function syncDataToFirebase() {
            if (!currentUser) return;
            await setDoc(doc(db, "leaderboard", currentUser.uid), {
                name: currentUser.displayName || currentUser.email.split('@')[0],
                clicks: count,
                lastUpdated: new Date()
            }, { merge: true });
        }

        // UI 控制邏輯
        const closeAll = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        
        document.getElementById('open-auth-btn').onclick = () => {
            if(currentUser) document.getElementById('user-menu-box').style.display = 'block';
            else document.getElementById('auth-box').style.display = 'block';
        };

        document.getElementById('rank-btn').onclick = () => {
            document.getElementById('leaderboard-box').style.display = 'block';
            const q = query(collection(db, "leaderboard"), orderBy("clicks", "desc"), limit(10));
            onSnapshot(q, (sn) => {
                const l = document.getElementById('rank-list'); l.innerHTML = '';
                sn.forEach(d => {
                    const data = d.data();
                    l.innerHTML += `<div class="rank-item"><span>${data.name}</span><b>${data.clicks}</b></div>`;
                });
            });
        };

        document.getElementById('achievement-btn').onclick = () => document.getElementById('achievement-box').style.display = 'block';
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider).then(closeAll);
        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
        
        document.querySelectorAll('[id^="close-"]').forEach(btn => btn.onclick = closeAll);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('open-auth-btn').textContent = "👤 " + (user.displayName || user.email.split('@')[0]);
            }
        });

        window.oncontextmenu = () => false;
    </script>
</body>
</html>
