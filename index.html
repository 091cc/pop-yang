<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="dD8BLSdmLGFWDNZ_lxgi28iqK6gn1OapISj1-YDAPO4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POPYANG</title>
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        /* 效能優化：防止連點卡頓 */
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: none; 
            box-sizing: border-box;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: black; 
            user-select: none; -webkit-user-select: none; 
            font-family: 'Arial Black', sans-serif; 
        }

        .img-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            z-index: 1;
        }

        .pop-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
            pointer-events: none;
        }

        .pop-img.active { display: block; }
        
        #ui-container { 
            position: absolute; top: 20px; left: 50%; 
            transform: translateX(-50%); display: flex; 
            flex-direction: column; align-items: center; 
            z-index: 10; pointer-events: none; width: 100%; 
        }

        #game-logo { width: 80px; height: 80px; margin-bottom: 10px; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #popyang { color: white; font-size: 60px; font-weight: 900; margin: 0; line-height: 1; text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000; }
        #score { color: white; font-size: 55px; font-weight: 900; margin-top: 5px; text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000; }
        
        #menu { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        
        button, .lang-select { 
            padding: 10px 15px; border-radius: 12px; border: 3px solid black; 
            font-weight: bold; cursor: pointer; background: white; 
            transition: 0.1s; box-shadow: 0 4px 0 #000; font-family: sans-serif; 
            text-align: center; outline: none;
        }

        button:active { transform: translateY(2px); box-shadow: 0 0 0 #000; }

        .modal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 25px; border-radius: 25px; z-index: 200; 
            display: none; width: 90%; max-width: 320px; border: 6px solid #000; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); color: black;
        }

        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #000; border-radius: 8px; font-size: 16px; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 2px solid #eee; }
        
        #privacy-link { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 10; }
        #privacy-link a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px; }

        @media (max-width: 480px) {
            #popyang { font-size: 40px; }
            #score { font-size: 45px; }
            #game-logo { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <img src="logo.png" id="game-logo" onerror="this.style.display='none'">
        <div id="popyang">POPYANG</div>
        <div id="score">0</div>
    </div>

    <div class="img-container" id="game-target">
        <img id="img-close" class="pop-img active" src="https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg">
        <img id="img-open" class="pop-img" src="https://raw.githubusercontent.com/091cc/pop-yang/main/3.jpg">
    </div>

    <audio id="pop-sound" src="pop.mp3" preload="auto"></audio>

    <div id="menu">
        <button id="open-auth-btn">👤 LOGIN/SIGN UP</button>
        <button id="rank-btn">🏆 Leader Board</button>
        <button id="achievement-btn">🎖️ Achievement</button>
        <select id="languages" class="lang-select">
            <option value="en">🌏 English</option>
            <option value="zh-TW">🌏 正體中文</option>
            <option value="zh-cn">🌏 残体中文</option>
        </select>
    </div>

    <div id="auth-box" class="modal">
        <h2 style="text-align:center; margin:0;">Account login</h2>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-password" placeholder="Password">
        <button id="email-login-btn" style="width:100%; background: #4CAF50; color: white;">Login</button>
        <button id="email-reg-btn" style="width:100%; margin-top:5px; background: #2196F3; color: white;">Sign up</button>
        <div style="text-align:center; margin: 10px 0; color: #666;">or</div>
        <button id="google-login-btn" style="width:100%; background: white; display: flex; align-items: center; justify-content: center; gap: 5px; color: black; border: 2px solid #000;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google Login
        </button>
        <button id="close-auth" style="width:100%; margin-top:15px; background: #eee;">Cancel</button>
    </div>

    <div id="user-menu-box" class="modal">
        <h2 style="text-align:center; margin:0;">Settings</h2>
        <p id="name-limit-hint" style="text-align:center; color: #e67e22; font-size: 13px; font-weight: bold;">⚠️ You can only change name ONCE!</p>
        <input type="text" id="new-nickname" placeholder="Enter new name">
        <button id="update-name-btn" style="width:100%; background: #4CAF50; color: white;">Update Name (1 Left)</button>
        <hr>
        <button id="logout-btn" style="width:100%; background: #ff7675; color: white;">Logout</button>
        <button id="close-user-menu" style="width:100%; margin-top:10px; background: #eee;">Close</button>
    </div>

    <div id="leaderboard-box" class="modal">
        <h2 style="text-align:center; margin:0;">Top 10</h2>
        <div id="rank-list" style="max-height: 300px; overflow-y: auto; margin-top: 10px;">Loading...</div>
        <button id="close-rank" style="width:100%; margin-top:20px; background: #ff7675; color: white;">Close</button>
    </div>

    <div id="achievement-box" class="modal">
        <h2 style="text-align:center; margin:0;">🏅 Achievements</h2>
        <div id="achievement-list" style="max-height: 300px; overflow-y: auto; margin-top: 10px;">
            <p style="text-align:center; color:#999;">Coming soon...</p>
        </div>
        <button id="close-achievement" style="width:100%; margin-top:20px; background: #eee;">Close</button>
    </div>

    <div id="privacy-link"><a href="privacy" target="_blank">Privacy Policy</a></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJYoQH85HDsRsS-Ue69DPfRaJXik7kcEY",
            authDomain: "pop-yang.firebaseapp.com",
            projectId: "pop-yang",
            storageBucket: "pop-yang.firebasestorage.app",
            messagingSenderId: "787574512577",
            appId: "1:787574512577:web:72094160cc3da32b86ed40"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        const scoreDisplay = document.getElementById('score');
        const gameTarget = document.getElementById('game-target');
        const imgClose = document.getElementById('img-close');
        const imgOpen = document.getElementById('img-open');
        const popSound = document.getElementById('pop-sound');
        
        let count = parseInt(localStorage.getItem('yang_clicks')) || 0;
        let currentUser = null;
        let isPressed = false;
        let uploadTimer = null;
        let hasChangedName = false; // 用於本地狀態追蹤

        scoreDisplay.textContent = count;

        // 點擊邏輯 (優化版)
        function pressDown(e) {
            if (isPressed) return;
            if (e && e.cancelable) e.preventDefault();
            isPressed = true;
            imgClose.classList.remove('active');
            imgOpen.classList.add('active');
            count++;
            scoreDisplay.textContent = count;
            localStorage.setItem('yang_clicks', count);
            const s = popSound.cloneNode(); s.play().catch(()=>{}); s.onended = () => s.remove();
            if (currentUser) {
                clearTimeout(uploadTimer);
                uploadTimer = setTimeout(syncDataToFirebase, 2000);
            }
        }
        function pressUp() { isPressed = false; imgOpen.classList.remove('active'); imgClose.classList.add('active'); }

        async function syncDataToFirebase() {
            if (!currentUser) return;
            try {
                await setDoc(doc(db, "leaderboard", currentUser.uid), {
                    name: currentUser.displayName || currentUser.email.split('@')[0],
                    clicks: count,
                    lastUpdated: new Date()
                }, { merge: true });
            } catch (e) { console.error(e); }
        }

        gameTarget.addEventListener('touchstart', pressDown, { passive: false });
        window.addEventListener('touchend', pressUp);
        gameTarget.addEventListener('mousedown', (e) => { if(e.button === 0) pressDown(e); });
        window.addEventListener('mouseup', pressUp);
        window.addEventListener('keydown', (e) => { if(e.target.tagName !== 'INPUT' && !e.repeat && (e.key === ' ' || e.key === 'Enter')) pressDown(e); });
        window.addEventListener('keyup', pressUp);

        // 狀態監聽
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('open-auth-btn').textContent = "👤 " + (user.displayName || user.email.split('@')[0]);
                
                const docSnap = await getDoc(doc(db, "leaderboard", user.uid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.clicks > count) {
                        count = data.clicks;
                        scoreDisplay.textContent = count;
                        localStorage.setItem('yang_clicks', count);
                    }
                    // 檢查是否已更名過
                    hasChangedName = data.nameChanged || false;
                    updateNameUI();
                }
            } else {
                currentUser = null;
                document.getElementById('open-auth-btn').textContent = "👤 LOGIN/SIGN UP";
            }
        });

        // 更新更名按鈕 UI
        function updateNameUI() {
            const btn = document.getElementById('update-name-btn');
            const hint = document.getElementById('name-limit-hint');
            if (hasChangedName) {
                btn.textContent = "Limit Reached (0 Left)";
                btn.style.background = "#ccc";
                btn.disabled = true;
                hint.textContent = "❌ You have already used your one-time change.";
                hint.style.color = "red";
            } else {
                btn.textContent = "Update Name (1 Left)";
                btn.style.background = "#4CAF50";
                btn.disabled = false;
            }
        }

        // 修改暱稱：限制一次
        document.getElementById('update-name-btn').onclick = async () => {
            if (hasChangedName) return alert("You can't change your name anymore!");
            
            const newName = document.getElementById('new-nickname').value.trim();
            if(!newName || !currentUser || newName.length > 15) return alert("Invalid Name (1-15 chars)");
            
            if (!confirm("Are you sure? This name change is PERMANENT and can only be done ONCE.")) return;

            try {
                // 1. 更新 Auth Profile
                await updateProfile(auth.currentUser, { displayName: newName });
                // 2. 更新 Firestore 並標記已更名
                await setDoc(doc(db, "leaderboard", currentUser.uid), { 
                    name: newName,
                    nameChanged: true 
                }, { merge: true });
                
                alert("Name updated successfully!");
                location.reload();
            } catch (err) { alert("Error: " + err.message); }
        };

        // 彈窗與選單控制
        const closeAll = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById('open-auth-btn').onclick = () => {
            if(currentUser) {
                document.getElementById('user-menu-box').style.display = 'block';
                document.getElementById('new-nickname').value = currentUser.displayName || "";
                updateNameUI();
            } else document.getElementById('auth-box').style.display = 'block';
        };
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider).then(closeAll);
        document.getElementById('email-reg-btn').onclick = () => {
            const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-password').value;
            createUserWithEmailAndPassword(auth, email, pass).then(closeAll).catch(e => alert(e.message));
        };
        document.getElementById('email-login-btn').onclick = () => {
            const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-password').value;
            signInWithEmailAndPassword(auth, email, pass).then(closeAll).catch(e => alert(e.message));
        };
        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
        document.getElementById('rank-btn').onclick = () => {
            document.getElementById('leaderboard-box').style.display = 'block';
            const q = query(collection(db, "leaderboard"), orderBy("clicks", "desc"), limit(10));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('rank-list');
                list.innerHTML = '';
                snapshot.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="rank-item"><span>${data.name || 'Player'}</span><b>${data.clicks}</b></div>`;
                });
            });
        };
        document.getElementById('achievement-btn').onclick = () => document.getElementById('achievement-box').style.display = 'block';
        document.querySelectorAll('[id^="close-"]').forEach(btn => btn.onclick = closeAll);
        window.oncontextmenu = () => false;
    </script>
</body>
</html>
