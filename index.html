<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POPYANG</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            user-select: none; -webkit-user-select: none;
        }
        #pop-img {
            width: 100vw; height: 100vh; object-fit: cover;
            cursor: pointer; display: block;
        }
        #ui-container {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%); display: flex;
            flex-direction: column; align-items: center;
            z-index: 10; pointer-events: none; width: 100%;
        }
        #popyang {
            color: white; font-family: 'Arial Black', sans-serif;
            font-size: 65px; font-weight: 900; margin: 0; line-height: 1;
            text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000, 0 4px 0 #000, 0 -4px 0 #000, 4px 0 0 #000, -4px 0 0 #000;
        }
        #score {
            color: white; font-family: 'Arial Black', sans-serif;
            font-size: 50px; font-weight: 900; margin-top: 10px;
            text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000, 0 4px 0 #000, 0 -4px 0 #000, 4px 0 0 #000, -4px 0 0 #000;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="popyang">POPYANG</div>
        <div id="score">0</div>
    </div>

    <img id="pop-img" src="https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg">

    <script>
        const imgElement = document.getElementById('pop-img');
        const scoreDisplay = document.getElementById('score');
        const normalImg = "https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg";
        const popImg = "https://raw.githubusercontent.com/091cc/pop-yang/main/3.jpg";

        // 核心修正：確保一開始抓到的就是真正的數字數字
        let count = parseInt(localStorage.getItem('yang_clicks')) || 0;
        scoreDisplay.textContent = count;
        
        let isKeyPressed = false;

        function addPoint() {
            count = count + 1; // 明確的加法運算
            scoreDisplay.textContent = count;
            localStorage.setItem('yang_clicks', count.toString()); // 儲存為字串
        }

        function pressDown(e) {
            if (e.type === 'touchstart') e.preventDefault();
            
            // 處理鍵盤重複觸發
            if (e.type === 'keydown') {
                if (isKeyPressed) return;
                isKeyPressed = true;
            }

            imgElement.src = popImg;
            addPoint();
        }

        function pressUp() {
            isKeyPressed = false;
            imgElement.src = normalImg;
        }

        // 滑鼠與觸控
        imgElement.addEventListener('mousedown', pressDown);
        window.addEventListener('mouseup', pressUp);
        imgElement.addEventListener('touchstart', pressDown);
        window.addEventListener('touchend', pressUp);

        // 鍵盤支援
        window.addEventListener('keydown', pressDown);
        window.addEventListener('keyup', pressUp);
    </script>
</body>
</html>
