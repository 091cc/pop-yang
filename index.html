<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POPYANG</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; user-select: none; -webkit-user-select: none; font-family: 'Arial Black', sans-serif; }
        #pop-img { width: 100vw; height: 100vh; object-fit: cover; cursor: pointer; display: block; }
        #ui-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 10; pointer-events: none; width: 100%; }
        #popyang { color: white; font-size: 65px; font-weight: 900; margin: 0; line-height: 1; text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000, 0 4px 0 #000, 0 -4px 0 #000, 4px 0 0 #000, -4px 0 0 #000; }
        #score { color: white; font-size: 50px; font-weight: 900; margin-top: 10px; text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000, 0 4px 0 #000, 0 -4px 0 #000, 4px 0 0 #000, -4px 0 0 #000; }
        
        /* 登入與排行榜按鈕 */
        #menu { position: absolute; bottom: 20px; right: 20px; z-index: 100; display: flex; gap: 10px; }
        button { padding: 10px 15px; border-radius: 10px; border: 3px solid black; font-weight: bold; cursor: pointer; background: white; transition: 0.2s; }
        button:hover { background: #eee; }
        
        /* 排行榜彈窗 */
        #leaderboard-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 200; display: none; width: 280px; max-height: 400px; overflow-y: auto; border: 5px solid #000; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="popyang">POPYANG</div>
        <div id="score">0</div>
    </div>

    <img id="pop-img" src="https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg">
    <audio id="pop-sound" src="pop.mp3" preload="auto"></audio>

    <div id="menu">
        <button id="login-btn">Google 登入</button>
        <button id="rank-btn">排行榜</button>
    </div>

    <div id="leaderboard-box">
        <h2 style="text-align:center; margin-top:0;">全球前 10 名</h2>
        <div id="rank-list">載入中...</div>
        <button onclick="document.getElementById('leaderboard-box').style.display='none'" style="width:100%; margin-top:15px;">關閉</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJYoQH85HDsRsS-Ue69DPfRaJXik7kcEY",
            authDomain: "pop-yang.firebaseapp.com",
            projectId: "pop-yang",
            storageBucket: "pop-yang.firebasestorage.app",
            messagingSenderId: "787574512577",
            appId: "1:787574512577:web:72094160cc3da32b86ed40"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        const scoreDisplay = document.getElementById('score');
        const imgElement = document.getElementById('pop-img');
        const popSound = document.getElementById('pop-sound');
        const rankList = document.getElementById('rank-list');
        
        let count = parseInt(localStorage.getItem('yang_clicks')) || 0;
        let currentUser = null;
        let isKeyPressed = false;
        scoreDisplay.textContent = count;

        // 登入邏輯
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-btn').textContent = user.displayName;
                const userRef = doc(db, "leaderboard", user.uid);
                const userDoc = await getDoc(userRef);
                if (userDoc.exists()) {
                    if (userDoc.data().clicks > count) {
                        count = userDoc.data().clicks;
                        scoreDisplay.textContent = count;
                    }
                }
            }
        });

        // 核心計分與同步
        async function addPoint() {
            count++;
            scoreDisplay.textContent = count;
            localStorage.setItem('yang_clicks', count);
            
            popSound.currentTime = 0;
            popSound.play().catch(()=>{});

            // 如果已登入，即時同步到雲端
            if (currentUser) {
                setDoc(doc(db, "leaderboard", currentUser.uid), {
                    name: currentUser.displayName,
                    clicks: count
                }, { merge: true });
            }
        }

        // 排行榜即時更新
        document.getElementById('rank-btn').onclick = () => {
            document.getElementById('leaderboard-box').style.display = 'block';
            const q = query(collection(db, "leaderboard"), orderBy("clicks", "desc"), limit(10));
            onSnapshot(q, (snapshot) => {
                rankList.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    rankList.innerHTML += `<div class="rank-item"><span>${data.name}</span><b>${data.clicks}</b></div>`;
                });
            });
        };

        function pressDown(e) {
            if (e.type === 'touchstart') e.preventDefault();
            if (e.type === 'keydown') { if (isKeyPressed) return; isKeyPressed = true; }
            imgElement.src = "https://raw.githubusercontent.com/091cc/pop-yang/main/3.jpg";
            addPoint();
        }

        function pressUp() { isKeyPressed = false; imgElement.src = "https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg"; }

        imgElement.addEventListener('mousedown', pressDown);
        window.addEventListener('mouseup', pressUp);
        imgElement.addEventListener('touchstart', pressDown);
        window.addEventListener('touchend', pressUp);
        window.addEventListener('keydown', pressDown);
        window.addEventListener('keyup', pressUp);
    </script>
</body>
</html>
