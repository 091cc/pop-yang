<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Yang - 水壺點擊大賽</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #5da9ff;
            font-family: 'Microsoft JhengHei', sans-serif;
            user-select: none;
            overflow: hidden;
        }

        #ui {
            position: absolute;
            top: 5%;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #score {
            font-size: 80px;
            margin: 0;
        }

        #rank-text {
            font-size: 24px;
            background: rgba(0,0,0,0.2);
            padding: 5px 20px;
            border-radius: 20px;
        }

        #pop-img {
            max-width: 90vw;
            max-height: 70vh;
            cursor: pointer;
            border: 5px solid white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="ui">
        <p id="score">0</p>
        <div id="rank-text">等級：裝水中...</div>
    </div>

    <img id="pop-img" src="https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg" alt="Pop Yang">

    <script>
        const imgElement = document.getElementById('pop-img');
        const scoreDisplay = document.getElementById('score');
        const rankDisplay = document.getElementById('rank-text');

        const normalImg = "https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg";
        const popImg = "https://raw.githubusercontent.com/091cc/pop-yang/main/3.jpg";

        let count = parseInt(localStorage.getItem('yang_clicks')) || 0;
        scoreDisplay.textContent = count;
        updateRank(count);

        function updateRank(val) {
            if (val > 1000) rankDisplay.textContent = "等級：水壺之神 🏆";
            else if (val > 500) rankDisplay.textContent = "等級：開蓋達人 🔥";
            else if (val > 100) rankDisplay.textContent = "等級：資深補水員";
            else if (val > 10) rankDisplay.textContent = "等級：初級裝水生";
        }

        function doPop(e) {
            if (e.type === 'touchstart') e.preventDefault();
            
            count++;
            scoreDisplay.textContent = count;
            localStorage.setItem('yang_clicks', count);
            updateRank(count);

            imgElement.src = popImg;
            imgElement.classList.add('active');

            setTimeout(() => {
                imgElement.src = normalImg;
                imgElement.classList.remove('active');
            }, 100);
        }

        imgElement.addEventListener('mousedown', doPop);
        imgElement.addEventListener('touchstart', doPop);
    </script>
</body>
</html>
