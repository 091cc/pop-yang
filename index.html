<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="dD8BLSdmLGFWDNZ_lxgi28iqK6gn1OapISj1-YDAPO4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POPYANG</title>
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; user-select: none; -webkit-user-select: none; font-family: 'Arial Black', sans-serif; }
        #pop-img { width: 100vw; height: 100vh; object-fit: cover; cursor: pointer; display: block; }
        
        #ui-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 10; pointer-events: none; width: 100%; }
        #game-logo { width: 80px; height: 80px; margin-bottom: 10px; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #popyang { color: white; font-size: 60px; font-weight: 900; margin: 0; line-height: 1; text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000; }
        #score { color: white; font-size: 50px; font-weight: 900; margin-top: 5px; text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000; }
        
        #menu { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 10px 15px; border-radius: 12px; border: 3px solid black; font-weight: bold; cursor: pointer; background: white; transition: 0.2s; box-shadow: 0 4px 0 #000; font-family: sans-serif; }
        button:hover { background: #f0f0f0; transform: translateY(-2px); }
        button:active { transform: translateY(2px); box-shadow: 0 0 0 #000; }
        button:disabled { background: #ccc !important; cursor: not-allowed; box-shadow: none; transform: none; }

        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 25px; z-index: 200; display: none; width: 280px; border: 6px solid #000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 10px; margin: 8px 0; border: 2px solid #000; border-radius: 8px; font-size: 16px; }
        input:disabled { background: #f9f9f9; color: #999; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 2px solid #eee; color: black; font-family: sans-serif; }
        
        #privacy-link { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 10; }
        #privacy-link a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="ui-container">
        <img src="logo.png" id="game-logo" onerror="this.style.display='none'">
        <div id="popyang">POPYANG</div>
        <div id="score">0</div>
    </div>

    <img id="pop-img" src="https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg">
    <audio id="pop-sound" src="pop.mp3" preload="auto"></audio>

    <div id="menu">
        <button id="open-auth-btn">👤 LOGIN/SIGN UP</button>
        <button id="rank-btn">🏆 Leader Board</button>
        <button id="lang-btn">🌐 Change Language</button>
    </div>

    <div id="auth-box" class="modal">
        <h2 style="text-align:center; margin:0; color:black;">Account login</h2>
        <input type="email" id="auth-email" placeholder="e-mail">
        <input type="password" id="auth-password" placeholder="password (At least 6 characters)">
        <button id="email-login-btn" style="width:100%; background: #4CAF50; color: white;">Login</button>
        <button id="email-reg-btn" style="width:100%; margin-top:5px; background: #2196F3; color: white;">Sign up</button>
        <div style="text-align:center; margin: 10px 0; color: #666; font-size: 12px;">or</div>
        <button id="google-login-btn" style="width:100%; background: white; display: flex; align-items: center; justify-content: center; gap: 5px; color: black;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Use Google to log in
        </button>
        <button id="close-auth" style="width:100%; margin-top:15px; background: #eee; color: black;">Cancel</button>
    </div>

    <div id="user-menu-box" class="modal">
        <h2 style="text-align:center; margin:0; color:black;">Setting</h2>
        <p id="name-status-msg" style="text-align:center; color: #666; font-size: 14px; margin: 10px 0;">Modify your display name (limited to once)：</p>
        <input type="text" id="new-nickname" placeholder="Enter a new nickname">
        <button id="update-name-btn" style="width:100%; background: #4CAF50; color: white;">Save the name</button>
        <hr style="margin: 20px 0;">
        <button id="logout-btn" style="width:100%; background: #ff7675; color: white;">Logout</button>
        <button id="close-user-menu" style="width:100%; margin-top:10px; background: #eee; color: black;">Close</button>
    </div>

    <div id="leaderboard-box" class="modal">
        <h2 style="text-align:center; margin:0; color:black;">Top 10</h2>
        <div id="rank-list" style="max-height: 300px; overflow-y: auto;">Loading...</div>
        <button id="close-rank" style="width:100%; margin-top:20px; background: #ff7675; color: white;">Close</button>
    </div>

    <div id="lang-box" class="modal">
        <h2 style="text-align:center; margin:0; color:black;">Language / 語言</h2>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
            <button class="lang-option" data-lang="zh-tw" style="width:100%;">正體中文</button>
            <button class="lang-option" data-lang="en" style="width:100%;">English</button>
            <button class="lang-option" data-lang="zh-cn" style="width:100%;">残体中文</button>
        </div>
        <button id="close-lang" style="width:100%; margin-top:20px; background: #eee; color: black;">Close / 關閉</button>
    </div>

    <div id="privacy-link"><a href="privacy" target="_blank">Privacy Policy</a></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJYoQH85HDsRsS-Ue69DPfRaJXik7kcEY",
            authDomain: "pop-yang.firebaseapp.com",
            projectId: "pop-yang",
            storageBucket: "pop-yang.firebasestorage.app",
            messagingSenderId: "787574512577",
            appId: "1:787574512577:web:72094160cc3da32b86ed40"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        const scoreDisplay = document.getElementById('score');
        const imgElement = document.getElementById('pop-img');
        const popSound = document.getElementById('pop-sound');
        
        let count = parseInt(localStorage.getItem('yang_clicks')) || 0;
        let currentUser = null;
        scoreDisplay.textContent = count;

        // --- 語言翻譯設定 ---
        const translations = {
            en: {
                loginBtn: "👤 LOGIN/SIGN UP",
                rankBtn: "🏆 Leader Board",
                langBtn: "🌐 Change Language",
                authTitle: "Account login",
                rankTitle: "Top 10",
                privacy: "Privacy Policy",
                settingTitle: "Setting",
                saveName: "Save the name"
            },
            zh-tw: {
                loginBtn: "👤 登入 / 注册",
                rankBtn: "🏆 排行榜",
                langBtn: "🌐 切換語言",
                authTitle: "帳號登入",
                rankTitle: "世界前 10 名",
                privacy: "隱私權政策",
                settingTitle: "個人設定",
                saveName: "儲存名稱"
            },
            zh-cn: {
                loginBtn: "👤 登录 / 註冊",
                rankBtn: "🏆 排行榜",
                langBtn: "🌐 切换语言",
                authTitle: "帐号登入",
                rankTitle: "世界前 10 名",
                privacy: "隐私权政策",
                settingTitle: "个人设定",
                saveName: "储存名称"
            }
        };

        const applyLanguage = (lang) => {
            const t = translations[lang];
            if (!currentUser) document.getElementById('open-auth-btn').textContent = t.loginBtn;
            document.getElementById('rank-btn').textContent = t.rankBtn;
            document.getElementById('lang-btn').textContent = t.langBtn;
            document.querySelector('#auth-box h2').textContent = t.authTitle;
            document.querySelector('#leaderboard-box h2').textContent = t.rankTitle;
            document.querySelector('#user-menu-box h2').textContent = t.settingTitle;
            document.getElementById('update-name-btn').textContent = t.saveName;
            document.querySelector('#privacy-link a').textContent = t.privacy;
        };

        // 初始化語言
        const savedLang = localStorage.getItem('popyang_lang') || 'en';
        applyLanguage(savedLang);

        // --- 視窗控制 ---
        const closeModals = () => {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('user-menu-box').style.display = 'none';
            document.getElementById('leaderboard-box').style.display = 'none';
            document.getElementById('lang-box').style.display = 'none';
        };

        document.getElementById('close-auth').onclick = closeModals;
        document.getElementById('close-user-menu').onclick = closeModals;
        document.getElementById('close-rank').onclick = closeModals;
        document.getElementById('close-lang').onclick = closeModals;

        // 開啟語言選單
        document.getElementById('lang-btn').onclick = () => {
            document.getElementById('lang-box').style.display = 'block';
        };

        // 選擇語言
        document.querySelectorAll('.lang-option').forEach(btn => {
            btn.onclick = () => {
                const lang = btn.getAttribute('data-lang');
                localStorage.setItem('popyang_lang', lang);
                applyLanguage(lang);
                closeModals();
            };
        });

        // --- 個人設定視窗開啟 & 狀態檢查 ---
        document.getElementById('open-auth-btn').onclick = async () => {
            if (currentUser) {
                document.getElementById('user-menu-box').style.display = 'block';
                const nameInput = document.getElementById('new-nickname');
                const updateBtn = document.getElementById('update-name-btn');
                const msg = document.getElementById('name-status-msg');
                
                nameInput.value = currentUser.displayName || currentUser.email.split('@')[0];

                const userDoc = await getDoc(doc(db, "leaderboard", currentUser.uid));
                if (userDoc.exists() && userDoc.data().nameChanged === true) {
                    nameInput.disabled = true;
                    updateBtn.disabled = true;
                    updateBtn.textContent = "The name has been modified.";
                    msg.textContent = "You have already changed the display name.";
                    msg.style.color = "red";
                } else {
                    nameInput.disabled = false;
                    updateBtn.disabled = false;
                    updateBtn.textContent = translations[localStorage.getItem('popyang_lang') || 'en'].saveName;
                    msg.textContent = "Modify your display name (limited to once)：";
                    msg.style.color = "#666";
                }
            } else {
                document.getElementById('auth-box').style.display = 'block';
            }
        };

        document.getElementById('update-name-btn').onclick = async () => {
            const newName = document.getElementById('new-nickname').value;
            if(!newName || !currentUser) return;
            if(newName.length > 15) return alert("The name is too long!");

            try {
                await updateProfile(auth.currentUser, { displayName: newName });
                await setDoc(doc(db, "leaderboard", currentUser.uid), { 
                    name: newName,
                    nameChanged: true 
                }, { merge: true });
                alert("The name has been updated successfully!");
                location.reload();
            } catch (err) { alert(err.message); }
        };

        // --- 帳號功能 ---
        document.getElementById('google-login-btn').onclick = () => {
            signInWithPopup(auth, provider).then(() => closeModals()).catch(err => alert(err.message));
        };
        document.getElementById('email-reg-btn').onclick = () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert("Please fill in the complete information.");
            createUserWithEmailAndPassword(auth, email, password).then(() => closeModals()).catch(err => alert(err.message));
        };
        document.getElementById('email-login-btn').onclick = () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            signInWithEmailAndPassword(auth, email, password).then(() => closeModals()).catch(err => alert(err.message));
        };
        document.getElementById('logout-btn').onclick = () => {
            signOut(auth).then(() => location.reload());
        };

        // --- 排行榜 ---
        document.getElementById('rank-btn').onclick = () => {
            document.getElementById('leaderboard-box').style.display = 'block';
            const q = query(collection(db, "leaderboard"), orderBy("clicks", "desc"), limit(10));
            onSnapshot(q, (snapshot) => {
                const rankList = document.getElementById('rank-list');
                rankList.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    rankList.innerHTML += `<div class="rank-item"><span>${data.name || '玩家'}</span><b>${data.clicks}</b></div>`;
                });
            });
        };

        // --- 狀態監聽 ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('open-auth-btn').textContent = "👤 " + (user.displayName || user.email.split('@')[0]);
                const userRef = doc(db, "leaderboard", user.uid);
                const userDoc = await getDoc(userRef);
                if (userDoc.exists() && userDoc.data().clicks > count) {
                    count = userDoc.data().clicks;
                    scoreDisplay.textContent = count;
                    localStorage.setItem('yang_clicks', count);
                }
            } else {
                currentUser = null;
                const currentLang = localStorage.getItem('popyang_lang') || 'en';
                document.getElementById('open-auth-btn').textContent = translations[currentLang].loginBtn;
            }
        });

        // --- 核心遊戲動作 ---
        async function addPoint() {
            count++;
            scoreDisplay.textContent = count;
            localStorage.setItem('yang_clicks', count);
            const s = popSound.cloneNode(); s.play().catch(()=>{}); s.onended = () => s.remove();
            if (currentUser) {
                setDoc(doc(db, "leaderboard", currentUser.uid), {
                    name: currentUser.displayName || currentUser.email.split('@')[0],
                    clicks: count,
                    lastUpdated: new Date()
                }, { merge: true });
            }
        }

        function pressDown(e) {
            if (e.repeat) return;
            if (e.type === 'touchstart') e.preventDefault();
            imgElement.src = "https://raw.githubusercontent.com/091cc/pop-yang/main/3.jpg";
            addPoint();
        }
        function pressUp() { imgElement.src = "https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg"; }

        imgElement.addEventListener('mousedown', pressDown);
        window.addEventListener('mouseup', pressUp);
        imgElement.addEventListener('touchstart', pressDown);
        window.addEventListener('touchend', pressUp);

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            pressDown(e);
        });
        window.addEventListener('keyup', pressUp);
    </script>
</body>
</html>
