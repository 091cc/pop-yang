<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="dD8BLSdmLGFWDNZ_lxgi28iqK6gn1OapISj1-YDAPO4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POPYANG</title>
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; user-select: none; -webkit-user-select: none; font-family: 'Arial Black', sans-serif; }
        
        #pop-img { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            cursor: pointer; 
            display: block; 
            z-index: 1;
            will-change: transform; /* 🔥 效能優化 */
        }
        
        #ui-container { 
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; flex-direction: column; align-items: center; 
            z-index: 10; pointer-events: none; width: 100%; 
        }

        #popyang { 
            color: white; font-size: 60px; font-weight: 900; margin: 0; 
            line-height: 1.2;
            text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000; 
        }

        #score { 
            color: white; font-size: 50px; font-weight: 900; 
            margin-top: 15px;
            text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000; 
        }

        #menu { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        
        button, .lang-select { 
            padding: 10px 15px; border-radius: 12px; border: 3px solid black; font-weight: bold; cursor: pointer; background: white;
        }

        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 25px; z-index: 200; display: none; width: 280px; border: 6px solid #000; }

        input { width: 92%; padding: 10px; margin: 8px 0; border: 2px solid #000; }

        .rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 2px solid #eee; }
    </style>
</head>

<body>

<div id="ui-container">
    <div id="popyang">POPYANG</div>
    <div id="score">0</div>
</div>

<img id="pop-img" src="https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg">

<div id="menu">
    <button id="open-auth-btn">👤 LOGIN / SIGN UP</button>
    <button id="rank-btn">🏆 RANK</button>
</div>

<div id="auth-box" class="modal">
    <input type="email" id="auth-email" placeholder="Email">
    <input type="password" id="auth-password" placeholder="Password">
    <button id="email-login-btn">LOGIN</button>
    <button id="google-login-btn">Google Login</button>
    <button id="logout-btn">Logout</button>
</div>

<div id="leaderboard-box" class="modal">
    <div id="rank-list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Firebase
const firebaseConfig = {
    apiKey: "你的KEY",
    authDomain: "你的domain",
    projectId: "你的project"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const provider = new GoogleAuthProvider();

// ===== 狀態 =====
let count = parseInt(localStorage.getItem('yang_clicks')) || 0;
let currentUser = null;
let lastClick = 0;
const CLICK_DELAY = 25;

const scoreDisplay = document.getElementById('score');
const img = document.getElementById('pop-img');

scoreDisplay.textContent = count;

// ===== 🔊 音效池 =====
const soundPool = [];
for (let i = 0; i < 8; i++) {
    const a = new Audio("pop.mp3");
    a.volume = 0.5;
    soundPool.push(a);
}

let soundIndex = 0;

function playSound() {
    const a = soundPool[soundIndex];
    if (!a.paused) return;
    a.currentTime = 0;
    a.play().catch(()=>{});
    soundIndex = (soundIndex + 1) % soundPool.length;
}

// ===== 💾 延遲儲存 =====
let saveTimer = null;
let saving = false;

function scheduleSave() {
    if (!currentUser || saving) return;
    if (saveTimer) clearTimeout(saveTimer);

    saveTimer = setTimeout(async () => {
        saving = true;
        await setDoc(doc(db, "leaderboard", currentUser.uid), {
            name: currentUser.displayName || currentUser.email.split('@')[0],
            clicks: count,
            lastUpdated: new Date()
        }, { merge: true });
        saving = false;
    }, 1000);
}

// ===== 點擊 =====
function clickAction(e) {
    if (e.target.closest('#menu') || e.target.closest('.modal')) return;
    if (e.repeat) return;

    const now = Date.now();
    if (now - lastClick < CLICK_DELAY) return;
    lastClick = now;

    count++;
    scoreDisplay.textContent = count;
    localStorage.setItem('yang_clicks', count);

    playSound();
    scheduleSave();

    requestAnimationFrame(()=>{
        img.src = "https://raw.githubusercontent.com/091cc/pop-yang/main/3.jpg";
    });
}

function releaseAction() {
    requestAnimationFrame(()=>{
        img.src = "https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg";
    });
}

// ===== 事件 =====
img.addEventListener('mousedown', clickAction);
window.addEventListener('mouseup', releaseAction);

img.addEventListener('touchstart', (e)=>{
    e.preventDefault();
    clickAction(e);
},{passive:false});

window.addEventListener('touchend', releaseAction);

window.addEventListener('keydown', clickAction);
window.addEventListener('keyup', releaseAction);

// ===== 登入 =====
onAuthStateChanged(auth, async (user)=>{
    currentUser = user;
});

document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider);
document.getElementById('logout-btn').onclick = () => signOut(auth);

// ===== 排行榜 =====
let unsubscribe = null;

document.getElementById('rank-btn').onclick = ()=>{
    document.getElementById('leaderboard-box').style.display = 'block';

    if (unsubscribe) unsubscribe();

    unsubscribe = onSnapshot(
        query(collection(db, "leaderboard"), orderBy("clicks", "desc"), limit(10)),
        (snap)=>{
            const list = document.getElementById('rank-list');
            list.innerHTML = '';
            snap.forEach(d=>{
                list.innerHTML += `<div class="rank-item"><span>${d.data().name}</span><b>${d.data().clicks}</b></div>`;
            });
        }
    );
};
</script>

</body>
</html>
