<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POPYANG</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            user-select: none;
            -webkit-user-select: none;
        }

        #pop-img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            cursor: pointer;
            display: block;
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 80%;
            max-height: 20vh;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <img id="pop-img" src="https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg" alt="Pop Yang">
    <img id="ui-overlay" src="text_overlay.png" alt="POPYANG_UI">

    <script>
        const imgElement = document.getElementById('pop-img');
        const normalImg = "https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg";
        const popImg = "https://raw.githubusercontent.com/091cc/pop-yang/main/3.jpg";

        function pressDown(e) {
            if (e.type === 'touchstart') e.preventDefault();
            imgElement.src = popImg;
        }

        function pressUp() {
            imgElement.src = normalImg;
        }

        imgElement.addEventListener('mousedown', pressDown);
        window.addEventListener('mouseup', pressUp);
        imgElement.addEventListener('touchstart', pressDown);
        window.addEventListener('touchend', pressUp);
    </script>
</body>
</html>
