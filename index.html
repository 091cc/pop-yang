<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POPYANG</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            user-select: none;
            -webkit-user-select: none;
        }

        #pop-img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            cursor: pointer;
            display: block;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            width: 100%;
        }

        /* 這是你要求的 POPYANG 文字樣式 */
        #popyang {
            color: white;
            font-family: 'Arial Black', sans-serif;
            font-size: 65px; /* 標題大一點 */
            font-weight: 900;
            margin: 0;
            line-height: 1;
            /* 黑色粗描邊 */
            text-shadow: 
                -4px -4px 0 #000,  
                 4px -4px 0 #000,
                -4px  4px 0 #000,
                 4px  4px 0 #000,
                 0    4px 0 #000,
                 0   -4px 0 #000,
                 4px  0    0 #000,
                -4px  0    0 #000;
        }

        #score {
            color: white;
            font-family: 'Arial Black', sans-serif;
            font-size: 50px;
            font-weight: 900;
            margin-top: 10px;
            /* 黑色粗描邊 */
            text-shadow: 
                -4px -4px 0 #000,  
                 4px -4px 0 #000,
                -4px  4px 0 #000,
                 4px  4px 0 #000,
                 0    4px 0 #000,
                 0   -4px 0 #000,
                 4px  0    0 #000,
                -4px  0    0 #000;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="popyang">POPYANG</div>
        <div id="score">0</div>
    </div>

    <img id="pop-img" src="https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg" alt="Pop Yang">

    <script>
        const imgElement = document.getElementById('pop-img');
        const scoreDisplay = document.getElementById('score');
        const normalImg = "https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg";
        const popImg = "https://raw.githubusercontent.com/091cc/pop-yang/main/3.jpg";

        let count = parseInt(localStorage.getItem('yang_clicks')) || 0;
        scoreDisplay.textContent = count;

        function pressDown(e) {
            if (e.type === 'touchstart') e.preventDefault();
            count++;
            scoreDisplay.textContent = count;
            localStorage.setItem('yang_clicks', count);
            imgElement.src = popImg;
        }

        function pressUp() {
            imgElement.src = normalImg;
        }

        imgElement.addEventListener('mousedown', pressDown);
        window.addEventListener('mouseup', pressUp);
        imgElement.addEventListener('touchstart', pressDown);
        window.addEventListener('touchend', pressUp);
    </script>
</body>
</html>
