<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POPYANG</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial Black', 'Gadget', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .pop-text {
            color: white;
            text-align: center;
            text-shadow: 
                -3px -3px 0 #000,  
                 3px -3px 0 #000,
                -3px  3px 0 #000,
                 3px  3px 0 #000,
                 0    3px 0 #000,
                 0   -3px 0 #000,
                 3px  0    0 #000,
                -3px  0    0 #000;
        }

        #title {
            font-size: 60px;
            margin: 0;
            letter-spacing: 2px;
        }

        #score {
            font-size: 45px;
            margin-top: -5px;
        }

        #pop-img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            cursor: pointer;
            display: block;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1 id="title" class="pop-text">POPYANG</h1>
        <div id="score" class="pop-text">0</div>
    </div>

    <img id="pop-img" src="https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg" alt="Pop Yang">

    <script>
        const imgElement = document.getElementById('pop-img');
        const scoreDisplay = document.getElementById('score');

        const normalImg = "https://raw.githubusercontent.com/091cc/pop-yang/main/1.jpg";
        const popImg = "https://raw.githubusercontent.com/091cc/pop-yang/main/3.jpg";

        let count = parseInt(localStorage.getItem('yang_clicks')) || 0;
        scoreDisplay.textContent = count;

        function pressDown(e) {
            if (e.type === 'touchstart') e.preventDefault();
            
            count++;
            scoreDisplay.textContent = count;
            localStorage.setItem('yang_clicks', count);

            imgElement.src = popImg;
        }

        function pressUp() {
            imgElement.src = normalImg;
        }

        imgElement.addEventListener('mousedown', pressDown);
        window.addEventListener('mouseup', pressUp);
        
        imgElement.addEventListener('touchstart', pressDown);
        window.addEventListener('touchend', pressUp);
    </script>
</body>
</html>
